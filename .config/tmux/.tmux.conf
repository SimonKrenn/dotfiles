# set default shell to fish
set-option -g default-shell /opt/homebrew/bin/fish
# enable mouse mode
set -g mouse on
set -g mode-keys vi

set -g prefix M-a

set -gq allow-passthrough on
set -g visual-activity off

# Let pane bells propagate to Ghostty so it can handle desktop notifications.
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off


set -g default-terminal "${TERM}"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# base index
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

#cursor style
set -g cursor-style bar

# custom keymaps
bind h split-window -h
bind v split-window -v
bind j select-window -n
bind k select-window -p

# bind-key "K" display-popup -h 30% -w 30% -E "sesh picker -i -c -s -t -T -z"

bind-key "K" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @plugin 'Ataraxy-Labs/opensessions'

# one-hunter palette for tmux-dotbar
set -g @tmux-dotbar-bg "#191d21"
set -g @tmux-dotbar-fg "#45505b"
set -g @tmux-dotbar-fg-current "#E0E0E0"
set -g @tmux-dotbar-fg-session "#888888"
set -g @tmux-dotbar-fg-prefix "#F4457D"

set -g status-style 'bg=terminal'

set-hook -g client-dark-theme 'run-shell ~/.config/tmux/tmux.dark.sh'
set-hook -g client-light-theme 'run-shell ~/.config/tmux/tmux.light.sh'

run '~/.tmux/plugins/tpm/tpm'
